name: bitnet2lut
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip>=23.0

  # Core scientific stack
  # IMPORTANT: PyTorch from the pytorch channel is built against numpy 1.x.
  # Using numpy 2.x causes "Numpy is not available" RuntimeError.
  - numpy>=1.24,<2.0
  - pyyaml>=6.0

  # PyTorch (CPU-only — we don't need GPU for weight extraction)
  - pytorch>=2.4
  - cpuonly

  # CLI and display
  - click>=8.1
  - rich>=13.0
  - tqdm>=4.65

  # Dev/test
  - pytest>=7.0
  - pytest-cov>=4.0
  - ruff>=0.1

  # pip-only packages (not on conda-forge)
  - pip:
      - safetensors>=0.4.0
      - transformers>=4.45.0
      - huggingface-hub>=0.20.0
      - accelerate>=0.25.0
